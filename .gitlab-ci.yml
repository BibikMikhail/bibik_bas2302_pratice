workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'

stages:
  - build
  - test

build:
  stage: build
  tags:
    - bas2302
    - linux
  image: maven:3.9.6-eclipse-temurin-21
  script:
    - chmod +x mvnw
    - ./mvnw -B clean verify
  artifacts:
    paths:
      - target/*.jar
    when: on_success

semgrep-sast:
  stage: test
  tags:
    - bas2302
    - linux
  image: semgrep/semgrep:latest
  needs:
    - build
  script:
    - semgrep scan --config auto --gitlab-sast --output gl-sast-report.json "${CI_PROJECT_DIR}"
  artifacts:
    reports:
      sast: gl-sast-report.json
    paths:
      - gl-sast-report.json
    when: always

# Практика 5 — DAST (OWASP ZAP): образ, пустой entrypoint, зависимость от сборки, отчёты в artifacts.
dast-baseline:
  stage: test
  tags:
    - bas2302
    - linux
  image:
    name: zaproxy/zap-stable
    entrypoint: [""]
  needs:
    - job: build
      artifacts: true
  script:
    - mkdir -p zap/out
    - JAR=$(ls target/*.jar | grep -v '\.original$' | head -n1)
    - java -jar "$JAR" &
    - sleep 25
    - python3 /zap/zap-baseline.py -t http://127.0.0.1:8080 -c zap/zap-rules.tsv -r zap/out/zap-baseline-report.html -J zap/out/zap-baseline-report.json -I
  artifacts:
    when: always
    paths:
      - zap/out/
    expire_in: 7 days

dast-api:
  stage: test
  tags:
    - bas2302
    - linux
  image:
    name: zaproxy/zap-stable
    entrypoint: [""]
  needs:
    - job: build
      artifacts: true
  script:
    - mkdir -p zap/out
    - JAR=$(ls target/*.jar | grep -v '\.original$' | head -n1)
    - java -jar "$JAR" &
    - sleep 25
    - python3 /zap/zap-api-scan.py -t zap/openapi.yaml -f openapi -O http://127.0.0.1:8080 -c zap/zap-rules.tsv -r zap/out/zap-api-report.html -J zap/out/zap-api-report.json -I
  artifacts:
    when: always
    paths:
      - zap/out/
    expire_in: 7 days
