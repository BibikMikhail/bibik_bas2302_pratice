workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'

stages:
  - build
  - test

build:
  stage: build
  tags:
    - bas2302
    - linux
  image: maven:3.9.6-eclipse-temurin-21
  script:
    - chmod +x mvnw
    - ./mvnw -B clean verify
  artifacts:
    paths:
      - target/*.jar
    when: on_success

semgrep-sast:
  stage: test
  tags:
    - bas2302
    - linux
  image: semgrep/semgrep:latest
  needs:
    - build
  script:
    - semgrep scan --config auto --gitlab-sast --output gl-sast-report.json "${CI_PROJECT_DIR}"
  artifacts:
    reports:
      sast: gl-sast-report.json
    paths:
      - gl-sast-report.json
    when: always

dependency-check:
  stage: test
  tags:
    - bas2302
    - linux
  image: maven:3.9.6-eclipse-temurin-21
  needs:
    - build
  variables:
    NVD_API_KEY: $NVD_API_KEY
  script:
    - chmod +x mvnw
    - |
      if [ ! -f dependency-check-suppressions.xml ]; then
        printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?><suppressions xmlns="https://jeremylong.github.io/DependencyCheck/dependency-suppression.1.3.xsd"></suppressions>' > dependency-check-suppressions.xml
      fi
    - ./mvnw -B org.owasp:dependency-check-maven:12.1.3:check -Dformats=HTML -DsuppressionFile=dependency-check-suppressions.xml -DossindexAnalyzerEnabled=false -DfailOnError=false -DfailBuildOnCVSS=11
  artifacts:
    paths:
      - target/dependency-check-report.html
    when: always
