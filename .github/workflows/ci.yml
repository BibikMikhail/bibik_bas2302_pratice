name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: maven:3.9.6-eclipse-temurin-21
    steps:
      - uses: actions/checkout@v4

      - name: Build and test
        run: |
          chmod +x mvnw
          ./mvnw -B clean verify

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: target/*.jar

  sast:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Semgrep
        run: |
          python3 -m pip install --upgrade pip semgrep
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Semgrep scan
        run: |
          semgrep --version
          set +e
          semgrep scan --config auto --sarif --output "$GITHUB_WORKSPACE/semgrep.sarif" "$GITHUB_WORKSPACE"
          code=$?
          set -e
          if [ ! -f "$GITHUB_WORKSPACE/semgrep.sarif" ]; then
            printf '%s\n' '{"$schema":"https://json.schemastore.org/sarif-2.1.0.json","version":"2.1.0","runs":[]}' > "$GITHUB_WORKSPACE/semgrep.sarif"
          fi
          ls -la "$GITHUB_WORKSPACE/semgrep.sarif"
          if [ "$code" -gt 1 ]; then
            echo "::warning::Semgrep exited with $code"
          fi

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif

      - name: Upload SARIF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-sarif
          path: semgrep.sarif