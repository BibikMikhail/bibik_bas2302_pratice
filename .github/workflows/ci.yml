name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: maven:3.9.6-eclipse-temurin-21
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: |
          chmod +x mvnw
          ./mvnw -B clean verify
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: target/*.jar

  dast-baseline:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Host IP for ZAP container (Linux runner)
        id: net
        run: echo "host=$(ip -4 route show default | cut -d' ' -f3)" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          name: jar
          path: target
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Start application
        run: |
          mkdir -p zap/out
          JAR=$(ls target/*.jar | grep -v '\.original$' | head -n1)
          java -jar "$JAR" &
          sleep 25
      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.9.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: "http://${{ steps.net.outputs.host }}:8080"
          rules_file_name: zap/zap-rules.tsv
          allow_issue_writing: false
          fail_action: false
          artifact_name: zap-dast-baseline
          cmd_options: "-I -r zap/out/zap-baseline-report.html -J zap/out/zap-baseline-report.json"
      - name: Upload DAST reports (baseline)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-baseline-reports
          path: zap/out/

  dast-api:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Host IP for ZAP container (Linux runner)
        id: net
        run: echo "host=$(ip -4 route show default | cut -d' ' -f3)" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          name: jar
          path: target
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Start application
        run: |
          mkdir -p zap/out
          JAR=$(ls target/*.jar | grep -v '\.original$' | head -n1)
          java -jar "$JAR" &
          sleep 25
      - name: ZAP API Scan
        uses: zaproxy/action-api-scan@v0.10.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target: zap/openapi.yaml
          format: openapi
          rules_file_name: zap/zap-rules.tsv
          allow_issue_writing: false
          fail_action: false
          artifact_name: zap-dast-api
          cmd_options: "-O http://${{ steps.net.outputs.host }}:8080 -I -r zap/out/zap-api-report.html -J zap/out/zap-api-report.json"
      - name: Upload DAST reports (API)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dast-api-reports
          path: zap/out/
