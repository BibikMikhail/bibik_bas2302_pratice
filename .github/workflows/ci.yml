name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: maven:3.9.6-eclipse-temurin-21
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: |
          chmod +x mvnw
          ./mvnw -B clean verify
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: target/*.jar

  sast:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install Semgrep
        run: python3 -m pip install semgrep
      - name: Semgrep scan
        continue-on-error: true
        run: python3 -m semgrep scan --config auto --sarif --output semgrep.sarif .
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif