name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: maven:3.9.6-eclipse-temurin-21
    steps:
      - uses: actions/checkout@v4
      - name: Build and test
        run: |
          chmod +x mvnw
          ./mvnw -B clean verify
      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar
          path: target/*.jar

  dependency-check:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Ensure suppressions file
        run: |
          if [ ! -f dependency-check-suppressions.xml ]; then
            printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?><suppressions xmlns="https://jeremylong.github.io/DependencyCheck/dependency-suppression.1.3.xsd"></suppressions>' > dependency-check-suppressions.xml
          fi
      - name: OWASP Dependency-Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          chmod +x mvnw
          ./mvnw -B org.owasp:dependency-check-maven:12.1.3:check -Dformats=HTML -DsuppressionFile=dependency-check-suppressions.xml -DossindexAnalyzerEnabled=false -DfailOnError=false -DfailBuildOnCVSS=11
      - name: Upload SCA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
